<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Perfis - Sistema de Logística</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .test-container { max-width: 600px; margin: 0 auto; }
        .test-case { background: white; padding: 15px; margin: 10px 0; border-radius: 5px; border-left: 4px solid #007bff; }
        .test-case.pass { border-left-color: #28a745; }
        .test-case.fail { border-left-color: #dc3545; }
        .result { margin-top: 5px; font-size: 14px; }
        button { padding: 10px 15px; margin-top: 10px; cursor: pointer; }
        .output { background: #f9f9f9; padding: 10px; border-radius: 3px; font-family: monospace; white-space: pre-wrap; margin-top: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🧪 Testes do Sistema de Perfis</h1>
        <p>Este arquivo testa a funcionalidade de seleção de perfis e persistência de dados.</p>
        
        <button onclick="executarTodos()">▶️ Executar Todos os Testes</button>
        <button onclick="limparLocalStorage()">🗑️ Limpar localStorage</button>
        <button onclick="abrirAplicacao()">🌐 Abrir Aplicação Principal</button>
        
        <div id="test-results"></div>
    </div>

    <script>
        const testes = [];

        function adicionarTeste(nome, funcao) {
            testes.push({ nome, funcao });
        }

        function executarTodos() {
            document.getElementById('test-results').innerHTML = '';
            testes.forEach((teste, idx) => {
                setTimeout(() => {
                    try {
                        const resultado = teste.funcao();
                        exibirResultado(teste.nome, resultado.passou, resultado.mensagem);
                    } catch (erro) {
                        exibirResultado(teste.nome, false, `Erro: ${erro.message}`);
                    }
                }, idx * 500);
            });
        }

        function exibirResultado(nome, passou, mensagem) {
            const div = document.createElement('div');
            div.className = `test-case ${passou ? 'pass' : 'fail'}`;
            div.innerHTML = `
                <strong>${passou ? '✅' : '❌'} ${nome}</strong>
                <div class="result">${mensagem}</div>
            `;
            document.getElementById('test-results').appendChild(div);
        }

        function limparLocalStorage() {
            localStorage.clear();
            alert('localStorage foi limpo!');
        }

        function abrirAplicacao() {
            window.open('index.html', '_blank');
        }

        // TESTES
        
        adicionarTeste('localStorage está disponível', () => {
            const disponivel = typeof(Storage) !== 'undefined';
            return {
                passou: disponivel,
                mensagem: disponivel ? 'localStorage está funcionando corretamente.' : 'localStorage não está disponível.'
            };
        });

        adicionarTeste('Perfil padrão é salvo corretamente', () => {
            localStorage.clear();
            localStorage.setItem('perfilAtivo', 'cliente');
            const perfil = localStorage.getItem('perfilAtivo');
            return {
                passou: perfil === 'cliente',
                mensagem: `Perfil salvo: "${perfil}" (esperado: "cliente")`
            };
        });

        adicionarTeste('Dados de formulário são persistidos', () => {
            localStorage.clear();
            const dados = {
                novaDescricao: 'Notebook',
                codigoRastreio: 'BR123456789X',
                idEntregador: '1'
            };
            localStorage.setItem('dados_admin', JSON.stringify(dados));
            const recuperado = JSON.parse(localStorage.getItem('dados_admin'));
            const correto = recuperado.novaDescricao === 'Notebook' && recuperado.codigoRastreio === 'BR123456789X';
            return {
                passou: correto,
                mensagem: `Dados recuperados: ${JSON.stringify(recuperado)}`
            };
        });

        adicionarTeste('Múltiplos perfis podem ter dados diferentes', () => {
            localStorage.clear();
            localStorage.setItem('dados_admin', JSON.stringify({ novaDescricao: 'Admin data' }));
            localStorage.setItem('dados_cliente', JSON.stringify({ codigoRastreio: 'Cliente data' }));
            localStorage.setItem('dados_entregador', JSON.stringify({ idEntregador: 'Entregador data' }));
            
            const admin = JSON.parse(localStorage.getItem('dados_admin'));
            const cliente = JSON.parse(localStorage.getItem('dados_cliente'));
            const entregador = JSON.parse(localStorage.getItem('dados_entregador'));
            
            const correto = admin.novaDescricao === 'Admin data' && cliente.codigoRastreio === 'Cliente data' && entregador.idEntregador === 'Entregador data';
            return {
                passou: correto,
                mensagem: `Admin: ${admin.novaDescricao}, Cliente: ${cliente.codigoRastreio}, Entregador: ${entregador.idEntregador}`
            };
        });

        adicionarTeste('Alternar entre perfis preserva dados', () => {
            localStorage.clear();
            // Simular dados do admin
            localStorage.setItem('perfilAtivo', 'admin');
            localStorage.setItem('dados_admin', JSON.stringify({ campo1: 'valor1' }));
            
            // Trocar para cliente
            localStorage.setItem('perfilAtivo', 'cliente');
            localStorage.setItem('dados_cliente', JSON.stringify({ campo2: 'valor2' }));
            
            // Voltar para admin
            localStorage.setItem('perfilAtivo', 'admin');
            const dadosAdmin = JSON.parse(localStorage.getItem('dados_admin'));
            
            const correto = dadosAdmin.campo1 === 'valor1';
            return {
                passou: correto,
                mensagem: `Dados do admin preservados após alternância: ${JSON.stringify(dadosAdmin)}`
            };
        });

        console.log(`%c✅ Testes carregados: ${testes.length} testes disponíveis`, 'color: green; font-size: 14px;');
    </script>
</body>
</html>
